name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 0.9.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build app bundle and CLI
        run: |
          VERSION=${{ steps.version.outputs.VERSION }} make app
          VERSION=${{ steps.version.outputs.VERSION }} make build-cli

      - name: Add icon and CLI to app bundle
        run: |
          cp assets/AppIcon.icns build/Typtel.app/Contents/Resources/
          cp build/typtel build/Typtel.app/Contents/MacOS/

      - name: Create release archive
        run: |
          cd build
          zip -r Typtel-${{ steps.version.outputs.VERSION }}.zip Typtel.app
          shasum -a 256 Typtel-${{ steps.version.outputs.VERSION }}.zip > Typtel-${{ steps.version.outputs.VERSION }}.zip.sha256

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            build/Typtel-${{ steps.version.outputs.VERSION }}.zip
            build/Typtel-${{ steps.version.outputs.VERSION }}.zip.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # The cask downloads THIS artifact, so the cask sha256 must match the zip
      # built here — not whatever was pinned manually before the tag was pushed.
      # Auto-pin it to main so a stale sha can never block `brew upgrade` again.
      - name: Pin cask sha256 to the built artifact
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          SHA=$(shasum -a 256 "build/Typtel-${VERSION}.zip" | awk '{print $1}')
          echo "Built artifact sha256: ${SHA}"
          git checkout main
          perl -pi -e "s/sha256 \"[a-f0-9]{64}\"/sha256 \"${SHA}\"/" Casks/typtel.rb
          if git diff --quiet -- Casks/typtel.rb; then
            echo "Cask sha256 already matches the artifact; nothing to do."
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "ci: pin cask sha256 to v${VERSION} artifact [skip ci]" -- Casks/typtel.rb
            git push origin HEAD:main
          fi

  # Linux (X11) prebuilt binaries — the CLI + tray daemon for Debian-family
  # systems, built natively on Linux with CGO (mirrors the Kali build). Attached
  # to the same release as a tarball. Runs after `build` so the release exists.
  build-linux:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Get version from tag or input
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          fi

      - name: Build Linux amd64 binaries (CGO, like the Kali build)
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          mkdir -p dist
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/typtel ./cmd/typtel
          CGO_ENABLED=1 go build -ldflags "-s -w -X main.Version=${VERSION}" -o dist/typtel-tray ./cmd/typtel-tray

      - name: Package tarball + checksum
        run: |
          VERSION=${{ steps.version.outputs.VERSION }}
          cat > dist/INSTALL.txt <<'TXT'
          typtel — Linux (X11) prebuilt binaries (amd64)

            typtel        CLI — stats, typing test, charts (`typtel v`), inertia/push control
            typtel-tray   daemon — keystroke capture + inertia (+ a StatusNotifier tray icon if your DE has one)

          Requirements:
            - An X11 session (DISPLAY set). Wayland is NOT supported.
            - For inertia: `xset` — Debian/Ubuntu: sudo apt install x11-xserver-utils
            - A recent glibc (Debian 12+/Kali/Ubuntu 22.04+).

          Install:
            mkdir -p ~/.local/bin && cp typtel typtel-tray ~/.local/bin/
            ~/.local/bin/typtel-tray &

          No system tray (i3/sway/polybar)? typtel-tray runs headless — control it from the CLI:
            typtel inertia on|off|toggle|speed <name>|threshold <ms>|accel <rate>

          Docs: https://abaj8494.github.io/homebrew-typing-telemetry/
          TXT
          cd dist
          tar -czf "typtel-${VERSION}-linux-amd64.tar.gz" typtel typtel-tray INSTALL.txt
          sha256sum "typtel-${VERSION}-linux-amd64.tar.gz" > "typtel-${VERSION}-linux-amd64.tar.gz.sha256"

      - name: Attach to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/typtel-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz
            dist/typtel-${{ steps.version.outputs.VERSION }}-linux-amd64.tar.gz.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
